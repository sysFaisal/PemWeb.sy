<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Latihan 1</title>
    <style>
        body{
            margin: 30px;
        }
        .form-row{
            display: flex;
            flex-direction: row;
            margin: 5px;
        }
        p{
            margin: 0;
        }
        .p{
            width: 115px;
        }
        .input{
            width: 220px;
        }
    </style>
</head>
<body>
    <form>
        <div class="form-row">
            <p class="p">
                Nama Lengkap :
            </p>
            <input type="text" placeholder="Masukkan Nama Lengkap Anda" class="input">
        </div>
        <div class="form-row">
            <p class="p">
                Username :
            </p>
            <input type="text" placeholder="Masukkan Username" class="input">
        </div>
        <div class="form-row">
            <p class="p">
                Password :
            </p>
            <input type="password" placeholder="Masukkan Password" ="input">
        </div>
        <div class="form-row">
            <p class="p">
                Email :
            </p>
            <input type="email" placeholder="Masukkan Alamat email Anda" class="input">
        </div>
        <div class="form-row">
            <p class="p">
                Telepon :
            </p>
            <input type="number" placeholder="Masukkan Telepon" class="input">
        </div>
        <div class="form-row">
            <p class="p"></p>
            <input type="submit" value="Submit">
        </div>
    </form>
</body>
</html>
