<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <table>
            <tr>
                <th></th>
                <th></th>
            </tr>
            <tr>
                <td>
                    <p>Nama Lengkap</p>
                </td>
                <td>
                    <input type="text" placeholder="Masukkan Nama Lengkap Anda" name="nama_lengkap" required>
                </td>
            </tr>
            <tr>
                <td>
                    <p>Username</p>
                </td>
                <td>
                    <input type="text" placeholder="Masukkan Username" name="username" required>
                </td>
            </tr>
            <tr>
                <td>
                    <p>Password</p>
                </td>
                <td>
                    <input type="password" placeholder="Masukkan Password" name="password" required>
                </td>
            </tr>
            <tr>
                <td>
                    <p>Email</p>
                </td>
                <td>
                    <input type="email" placeholder="Masukkan Email" name="email" required>
                </td>
            </tr>
            <tr>
                <td>
                    <p>Telepon</p>
                </td>
                <td>
                    <input type="number" placeholder="Masukkan Telepon" name="telepon" required>
                </td>
            </tr>
            <tr>
                <td></td>
                <td>
                    <input type="submit" value="Buat Akun Saya">
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
