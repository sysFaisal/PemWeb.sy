<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas 2</title>
    <style>
        body {
            margin: 30px;
        }
        p {
            margin: 0;
        }
        input {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <form>
        <div>
            <p>
                Your Name :
            </p>
            <input type="text" name="Nama" placeholder="Please enter your name" required>
        </div>
        <div>
            <p>
                Your Email :
            </p>
            <input type="email" name="Email" placeholder="Please enter your email" required>
        </div>
        <div>
            <p>
                Departement :
            </p>
            <select name="dropdown" required>
                <option>Select Departement</option>
                <option value="Kementerian Keuangan">Kementerian Keuangan</option>
                <option value="Kementerian Agama">Kementerian Agama</option>
            </select>
        </div>


    </form>
</body>
</html>
